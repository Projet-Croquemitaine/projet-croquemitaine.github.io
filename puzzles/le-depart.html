<script>

    
  // ***
  // Combination Lock
  // ***
  
  var A = 65
  var Z = 90
  
  var combinationLock = {
    combination: 'LAZARO',
    locked: true,
    wheels: [A,A,A,A,A,A],
    increment: function(wheel) {
      if (this.wheels[wheel] === Z) {
        this.wheels[wheel] = A;
      } else {
        this.wheels[wheel]++;
      }
      
    },
    decrement: function(wheel) {
      if (this.wheels[wheel] === A) {
        this.wheels[wheel] = Z;
      } else {
        this.wheels[wheel]--;
      }
      
    },
    check: function() {
        let code = ""
        for(i=0; i<wheels.length; i++)
        {
            code += wheels[i].value.toString();
        }
        this.locked = (this.combination !== code);
        //document.getElementById('printer').textContent = code;
        
    },
    spin: function() {
      // randomize the wheels
      for (i = 0; i < wheels.length; i++) {
        this.wheels[i] =(char)(getRandomInt(Z+1, A-1));
      }
    }
  }

  // ***
  // Reusable Functions
  // ***

  function getRandomInt(min, max) {
    min = Math.ceil(min);
    max = Math.floor(max);
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }


  // ***
  // Presentation
  // ***

  // Increment buttons
  let increments = document.getElementsByClassName('increment');

  for (let i = 0; i < increments.length; i++) {
    increments[i].addEventListener('click', function(){
      let wheelIndex = parseInt(this.getAttribute('index'));
      combinationLock.increment(wheelIndex);
      document.querySelectorAll('.digit')[wheelIndex].value = String.fromCharCode(combinationLock.wheels[wheelIndex]);
      checkLock();
    });
  }

  // Decrement buttons
  let decrements = document.getElementsByClassName('decrement');

  for (let i = 0; i < decrements.length; i++) {
    decrements[i].addEventListener('click', function(){
      let wheelIndex = parseInt(this.getAttribute('index'));
      combinationLock.decrement(wheelIndex);
      document.querySelectorAll('.digit')[wheelIndex].value = String.fromCharCode(combinationLock.wheels[wheelIndex]);
      checkLock();
    });
  }

  // Keypress
  
  let wheels = document.getElementsByClassName('digit');

  for (let i = 0; i < wheels.length; i++) {
    wheels[i].addEventListener('keyup', function(e){

        // if number is longer than 1 digit
        if (this.value.length > 1) {
            this.value = this.value[this.value.length-1];
        }

        // if number is less that 1 digit
        if (this.value.length < 1) {
            this.value = A;
        }

        if(this.value < A || this.value >Z){
            this.value = A;
        } 
      // arrow key up
      if (e.which === 38) {
        let wheelIndex = parseInt(this.getAttribute('index'));
        combinationLock.increment(wheelIndex);
        document.querySelectorAll('.digit')[wheelIndex].value = combinationLock.wheels[wheelIndex];
        checkLock();
      }

      // arrow key down
      if (e.which === 40) {
        let wheelIndex = parseInt(this.getAttribute('index'));
        combinationLock.decrement(wheelIndex);
        document.querySelectorAll('.digit')[wheelIndex].value = combinationLock.wheels[wheelIndex].value.charCodeAt(0);
        checkLock();
      }
      
      
      // letter keys (A - Z)
      if (e.which >= A && e.which <= Z ) {
          let wheelIndex = parseInt(this.getAttribute('index'));
          combinationLock.wheels[wheelIndex] = document.querySelectorAll('.digit')[wheelIndex].value.charCodeAt(0);
          checkLock();
      }
      
      
      
      
    });
  }
  
  // Check lock
  function checkLock() {
    combinationLock.check();
    let button = $('.buttEnable');
    let false_button = $('.butt-stand-in');
    if (combinationLock.locked === false) {
        button.show();
        false_button.hide();
    }
    else
    {
        button.hide();
        false_button.show(); 
    }
  }
</script>
